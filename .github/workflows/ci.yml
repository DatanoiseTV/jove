# Fast PR / branch CI: builds Jove on macOS + Linux, runs the audits.
# No signing, no notarization — just the proof that main and proposed merges
# compile clean on both platforms. The full release pipeline lives in
# release.yml and runs on main pushes + tags.

name: ci

on:
  pull_request:
  push:
    branches: [ '**' ]    # includes main so we always get a fast CI signal even
                          # if release.yml's packaging stage fails.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-14, ubuntu-22.04, ubuntu-24.04 ]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: install linux deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          # webkit2gtk 4.1 (modern, libsoup-3) is mandatory on every Ubuntu
          # we support. webkit2gtk 4.0 (legacy, libsoup-2) only exists on
          # 22.04; installing it there lets JUCE produce a binary that also
          # runtime-dlopens the legacy SO for users on old distros.
          sudo apt-get update
          UBUNTU_VER=$(. /etc/os-release; echo "$VERSION_ID")
          PKGS=(libasound2-dev libjack-jackd2-dev
                libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev
                libxext-dev libxinerama-dev libxrandr-dev libxrender-dev
                libwebkit2gtk-4.1-dev libsoup-3.0-dev
                libglu1-mesa-dev mesa-common-dev libgtk-3-dev ninja-build)
          if [[ "$UBUNTU_VER" == "22.04" ]]; then
              PKGS+=(libwebkit2gtk-4.0-dev libsoup2.4-dev)
          fi
          sudo apt-get install -y "${PKGS[@]}"

      - name: install macos deps
        if: matrix.os == 'macos-14'
        run: brew install ninja

      - name: configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DJOVE_INSTALL_LOCAL=OFF

      - name: build
        # jove_param_roundtrip is Apple/Windows-only (its console app compiles
        # the WebView editor; Linux juceaide only generates the WebKit helper
        # header for plugin targets) — CMake skips registering it on Linux, so
        # a plain ctest below stays correct on every platform.
        run: |
          if [[ "${{ matrix.os }}" == ubuntu-* ]]; then
            cmake --build build --target Jove_All jove_engine_audit -j
          else
            cmake --build build --target Jove_All jove_engine_audit jove_param_roundtrip -j
          fi

      - name: tests
        run: ctest --test-dir build --output-on-failure
