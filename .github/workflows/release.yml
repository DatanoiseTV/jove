# Release pipeline: builds, packages and publishes Jove.
#
# Triggers:
#   - push to main           -> updates the rolling "nightly" prerelease
#                               with the latest artefacts.
#   - push of a vX.Y.Z tag   -> publishes a versioned, "latest" release.
#   - workflow_dispatch      -> manual run; behaves like a nightly unless
#                               an input tag is supplied.
#
# Outputs per build:
#   - macOS:  Jove-<version>-macOS-unsigned.zip  (universal AU + VST3 +
#             Standalone; UNSIGNED-RELEASE — see the same-named markers:
#             signing/notarization steps are gated `if: false` until the
#             Apple Developer agreement + per-repo secrets are in place,
#             mirroring Doobie's release.yml)
#   - Linux:  Jove-<version>-Linux-x86_64.tar.gz  (VST3 + Standalone)

name: release

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # don't kill an in-flight publish for the next commit

jobs:
  # --------------------------------------------------------------------------
  # macOS: universal AU + VST3 + Standalone.
  # --------------------------------------------------------------------------
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0       # full history so describe / dating works

      - name: resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              v="${GITHUB_REF#refs/tags/v}"
          else
              v="0.0.0-nightly.$(date -u +%Y%m%d).$(git rev-parse --short HEAD)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "JOVE_PKG_VERSION=$v" >> "$GITHUB_ENV"
          echo "resolved version: $v"

      - name: install ninja
        run: brew install ninja

      # UNSIGNED-RELEASE: signing + notarization not yet enabled for this
      # repo (Apple Developer agreement pending + secrets not provisioned;
      # GitHub secrets are per-repo on a personal account). When enabling,
      # copy the cert-import + notarytool steps from Doobie's release.yml
      # and provision: MACOS_CERTIFICATE(_PWD), MACOS_INSTALLER_CERTIFICATE(_PWD),
      # MACOS_KEYCHAIN_PWD, APPLE_NOTARY_KEY_P8, APPLE_NOTARY_KEY_ID,
      # APPLE_NOTARY_ISSUER_ID, MACOS_APPLICATION_IDENTITY,
      # MACOS_INSTALLER_IDENTITY, APPLE_TEAM_ID.

      - name: configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DJOVE_INSTALL_LOCAL=OFF
          "-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"

      - name: build
        run: cmake --build build --target Jove_All jove_engine_audit jove_param_roundtrip -j

      - name: tests
        run: ctest --test-dir build --output-on-failure

      - name: package unsigned zip
        run: |
          set -euo pipefail
          mkdir -p dist
          export ARTEFACT_DIR="$PWD/build/Jove_artefacts/Release"
          export OUTPUT_ZIP="$PWD/dist/Jove-${JOVE_PKG_VERSION}-macOS-unsigned.zip"
          bash packaging/macos/build-zip.sh

      - uses: actions/upload-artifact@v4
        with:
          name: jove-macos
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 14

  # --------------------------------------------------------------------------
  # Linux: VST3 + Standalone, tar.gz. No signing concept on Linux.
  # --------------------------------------------------------------------------
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              v="${GITHUB_REF#refs/tags/v}"
          else
              v="0.0.0-nightly.$(date -u +%Y%m%d).$(git rev-parse --short HEAD)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: install deps
        run: |
          # Same version-aware install as ci.yml: 4.1 mandatory, 4.0 only on
          # Ubuntu 22.04 (where the dev package still exists).
          sudo apt-get update
          UBUNTU_VER=$(. /etc/os-release; echo "$VERSION_ID")
          PKGS=(libasound2-dev libjack-jackd2-dev
                libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev
                libxext-dev libxinerama-dev libxrandr-dev libxrender-dev
                libwebkit2gtk-4.1-dev libsoup-3.0-dev
                libglu1-mesa-dev mesa-common-dev libgtk-3-dev ninja-build)
          if [[ "$UBUNTU_VER" == "22.04" ]]; then
              PKGS+=(libwebkit2gtk-4.0-dev libsoup2.4-dev)
          fi
          sudo apt-get install -y "${PKGS[@]}"

      - name: configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DJOVE_INSTALL_LOCAL=OFF

      - name: build
        # jove_param_roundtrip is Apple/Windows-only; macOS CI exercises it.
        run: cmake --build build --target Jove_All jove_engine_audit -j

      - name: tests
        run: ctest --test-dir build --output-on-failure

      - name: package tarball
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist staging/Jove-$VERSION
          cp -R build/Jove_artefacts/Release/VST3/Jove.vst3      staging/Jove-$VERSION/
          cp -R build/Jove_artefacts/Release/Standalone/Jove     staging/Jove-$VERSION/
          cp README.md CHANGELOG.md LICENSE                      staging/Jove-$VERSION/
          tar -C staging -czf "dist/Jove-${VERSION}-Linux-x86_64.tar.gz" "Jove-$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: jove-linux
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  # --------------------------------------------------------------------------
  # Publish: collect both job artefacts and push them to a GitHub release.
  # Tag push  -> versioned release tagged vX.Y.Z, "latest".
  # main push -> rolling "nightly" prerelease, replaced each main push.
  # --------------------------------------------------------------------------
  publish:
    needs: [ macos, linux ]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: list artefacts
        run: ls -la dist/

      - name: publish (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          # UNSIGNED-RELEASE: prepend the unsigned-build banner to the
          # changelog notes so users see the xattr -cr requirement first.
          {
            cat .github/release-notes/unsigned-banner.md
            awk '/^## \['"${TAG#v}"'\]/{flag=1; next} /^## \[/{flag=0} flag' CHANGELOG.md \
              || echo "See CHANGELOG.md for details."
          } > "$RUNNER_TEMP/release-notes.md"
          # `gh release create` fails if the release already exists (e.g. the
          # tag was published manually first) — upload assets into it instead.
          if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" dist/* --clobber
          else
              gh release create "$TAG" dist/* \
                  --title "Jove $TAG" \
                  --notes-file "$RUNNER_TEMP/release-notes.md" \
                  --latest
          fi

      - name: publish (nightly)
        if: github.event_name != 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short HEAD)"
          # Replace the rolling nightly release with the current artefacts.
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          {
            cat .github/release-notes/unsigned-banner.md
            printf 'Latest build from `main` (%s). Unstable — use a tagged release if you need a stable version.\n' "$SHORT_SHA"
          } > "$RUNNER_TEMP/nightly-notes.md"
          gh release create nightly dist/* \
              --title "Jove nightly ($(date -u +%Y-%m-%d) $SHORT_SHA)" \
              --notes-file "$RUNNER_TEMP/nightly-notes.md" \
              --prerelease

      - name: publish (manual dispatch)
        # dispatching ON a tag ref backfills that tag's release via the step
        # above instead of minting a manual-* prerelease
        if: github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          STAMP="manual-$(date -u +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)"
          gh release create "$STAMP" dist/* \
              --title  "Jove manual build $STAMP" \
              --notes  "Ad-hoc build dispatched from the Actions tab." \
              --prerelease
