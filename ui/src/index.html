<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jove</title>
  <link rel="stylesheet" href="jove.css" />
  <style>
    #diag {
      position: fixed; inset: 8px 8px auto 8px; z-index: 99999;
      background: #14161d; color: #cdd3e0; border: 1px solid #262a36;
      border-radius: 10px; padding: 12px 14px;
      font: 12px/1.5 ui-sans-serif, system-ui, sans-serif;
      display: grid; gap: 3px; box-shadow: 0 18px 40px -12px rgba(0,0,0,.8);
    }
    #diag .row { display: flex; gap: 8px; opacity: .45; }
    #diag .row.ok { opacity: 1; }
    #diag .row.ok .tick { color: #7ee0a0; }
    #diag .tick { width: 13px; text-align: center; }
    #diag .row.ok .tick::before { content: "\2713"; }
    #diag .row:not(.ok) .tick::before { content: "\00b7"; }
    #diag .err { margin-top: 6px; color: #ff9d9d; font-family: ui-monospace, monospace;
      font-size: 11px; white-space: pre-wrap; display: none; }
    #diag .err.on { display: block; }
    body:has(#app) #diag { display: none; }
  </style>
</head>
<body>
  <div id="diag" aria-live="polite">
    <div class="row ok"><span class="tick"></span>HTML</div>
    <div class="row" id="d-juce"><span class="tick"></span>JUCE bridge</div>
    <div class="row" id="d-react"><span class="tick"></span>React</div>
    <div class="row" id="d-babel"><span class="tick"></span>Babel</div>
    <div class="err" id="d-err"></div>
  </div>
  <div id="root"></div>

  <script>
    var ok = (id) => { var e = document.getElementById(id); if (e) e.classList.add('ok'); };
    var fail = (m) => { var e = document.getElementById('d-err'); if (e) { e.textContent = m; e.classList.add('on'); } };
    window.addEventListener('error', (e) => fail('JS error: ' + (e.message||e.error) + ' @ ' + (e.filename||'?') + ':' + (e.lineno||'?')));
    window.addEventListener('unhandledrejection', (e) => fail('rejection: ' + e.reason));
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    document.addEventListener('dragstart', (e) => e.preventDefault());
    document.addEventListener('selectstart', (e) => {
      var t = e.target;
      if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
      e.preventDefault();
    });
    // Controls must not hold keyboard focus, so typing / computer-MIDI never
    // changes a parameter. Buttons don't take focus on click; and if any
    // non-text control somehow has focus, keys are neutralised (but keys pass
    // through when nothing is focused, so host transport/MIDI still work).
    document.addEventListener('mousedown', (e) => {
      var b = e.target.closest && e.target.closest('button');
      if (b) e.preventDefault();
    }, true);
    document.addEventListener('keydown', (e) => {
      var a = document.activeElement;
      if (!a) return;
      if (a.tagName === 'INPUT' || a.tagName === 'TEXTAREA' || a.isContentEditable) return;
      if (a.tagName === 'BUTTON' || a.tagName === 'SELECT') { a.blur(); e.preventDefault(); }
    }, true);

    /* Fit-to-window: scale the fixed 1500x1000 #app design canvas to fill the
       host window. The editor locks its aspect ratio to 1500:1000, so the
       canvas fills edge-to-edge with at most a hair of centering. Re-fit on
       resize and a cheap watchdog for when JUCE sets WebView bounds from C++
       without bubbling a DOM resize event. */
    (function () {
      var DW = 1500, DH = 1000, lastKey = '';
      function fit() {
        var el = document.getElementById('app'); if (!el) return;
        var w = window.innerWidth || document.documentElement.clientWidth;
        var h = window.innerHeight || document.documentElement.clientHeight;
        if (!w || !h) return;
        var s = Math.min(w / DW, h / DH);
        var sw = DW * s, sh = DH * s;
        el.style.transform = 'translate(' + Math.max(0, (w - sw) / 2) + 'px,' + Math.max(0, (h - sh) / 2) + 'px) scale(' + s + ')';
        lastKey = w + 'x' + h;
      }
      window.addEventListener('resize', fit);
      window.addEventListener('load', fit);
      window.fitJove = fit;
      (function poll(n) {
        var el = document.getElementById('app');
        if (el) { fit(); return; }
        if (n > 0) setTimeout(function () { poll(n - 1); }, 30);
      })(120);
      setInterval(function () {
        if ((window.innerWidth + 'x' + window.innerHeight) !== lastKey) fit();
      }, 350);
    })();
  </script>

  <script src="juce-framework-frontend.js"></script>
  <script>ok('d-juce');</script>
  <script src="react.production.min.js"></script>
  <script src="react-dom.production.min.js"></script>
  <script>ok('d-react');</script>
  <script src="babel.min.js"></script>
  <script>
    ok('d-babel');
    window.useState = React.useState; window.useEffect = React.useEffect;
    window.useRef = React.useRef; window.useCallback = React.useCallback;
    window.useMemo = React.useMemo;
  </script>

  <script type="text/babel" data-presets="react" src="jove-bridge.jsx"></script>
  <script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
